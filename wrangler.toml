name = "analyseo"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Custom domain
routes = [
  { pattern = "analyseo.app", custom_domain = true }
]

# ---------------------------------------------------------------
# Secrets are injected at deploy time from Cloudflare Build Variables.
# See scripts/inject-env.js
#
# Required Build Variables in Cloudflare dashboard:
#   GOOGLE_CLIENT_SECRET
#   NEXTAUTH_SECRET
#   DATAFORSEO_LOGIN     (optional)
#   DATAFORSEO_PASSWORD  (optional)
# ---------------------------------------------------------------
[vars]
NEXTAUTH_URL = "https://analyseo.app"
GOOGLE_CLIENT_ID = "1025870161255-gtlrrush48pm0ghjl181jvql4n3veg8n.apps.googleusercontent.com"
NODE_ENV = "production"
