name = "analyseo"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Custom domain
routes = [
  { pattern = "analyseo.app", custom_domain = true }
]

# ---------------------------------------------------------------
# ONLY non-secret configuration goes here.
# Secrets MUST be set via: wrangler secret put <SECRET_NAME>
#
# Required secrets (run these commands once):
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put NEXTAUTH_SECRET
#   wrangler secret put DATAFORSEO_LOGIN
#   wrangler secret put DATAFORSEO_PASSWORD
# ---------------------------------------------------------------
[vars]
NEXTAUTH_URL = "https://analyseo.app"
GOOGLE_CLIENT_ID = "1025870161255-gtlrrush48pm0ghjl181jvql4n3veg8n.apps.googleusercontent.com"
NODE_ENV = "production"
